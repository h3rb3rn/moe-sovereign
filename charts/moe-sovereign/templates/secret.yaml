{{- if not .Values.auth.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "moe.fullname" . }}-auth
  labels:
    {{- include "moe.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Placeholder — operator MUST override this via --set-file or an
  # existing secret. The chart refuses to assume a default signing key.
  {{ .Values.auth.publicKeyField }}: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_ME_VIA_--set-file_OR_existingSecret
    -----END PUBLIC KEY-----
{{- end -}}
