apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moe.fullname" . }}-mcp
  labels:
    {{- include "moe.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  replicas: {{ .Values.mcp.replicas }}
  selector:
    matchLabels:
      {{- include "moe.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp
  template:
    metadata:
      labels:
        {{- include "moe.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp
    spec:
      serviceAccountName: {{ include "moe.serviceAccountName" . }}
      {{- if ne (include "moe.isOpenShift" .) "true" }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: mcp
          image: {{ include "moe.image.mcp" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.mcp.port }}
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: http }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
