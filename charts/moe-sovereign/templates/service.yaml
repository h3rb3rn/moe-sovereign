apiVersion: v1
kind: Service
metadata:
  name: {{ include "moe.fullname" . }}-orchestrator
  labels:
    {{- include "moe.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "moe.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
  ports:
    - name: http
      port: {{ .Values.orchestrator.port }}
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "moe.fullname" . }}-mcp
  labels:
    {{- include "moe.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  type: ClusterIP
  selector:
    {{- include "moe.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
  ports:
    - name: http
      port: {{ .Values.mcp.port }}
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "moe.fullname" . }}-admin
  labels:
    {{- include "moe.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: ClusterIP
  selector:
    {{- include "moe.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: admin
  ports:
    - name: http
      port: {{ .Values.admin.port }}
      targetPort: http
