apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "moe.fullname" . }}-env
  labels:
    {{- include "moe.labels" . | nindent 4 }}
data:
  MOE_PROFILE: {{ .Values.profile | quote }}
  KAFKA_URL: {{ include "moe.kafkaUrl" . | quote }}
  REDIS_URL: {{ include "moe.valkeyUrl" . | quote }}
  NEO4J_URI: {{ include "moe.neo4jUri" . | quote }}
  CHROMA_HOST: {{ .Values.external.chromaHost | quote }}
  JWT_ISSUER: {{ .Values.auth.jwtIssuer | quote }}
  JWT_AUDIENCE: {{ .Values.auth.jwtAudience | quote }}
  RATE_LIMIT_DEFAULT_RPM: {{ .Values.rateLimit.defaultRpm | quote }}
  RATE_LIMIT_DEFAULT_BURST: {{ .Values.rateLimit.defaultBurst | quote }}
  MOE_LOGS_DIR: /app/logs
  MOE_CACHE_DIR: /app/cache
  MOE_EXPERTS_DIR: {{ .Values.experts.mountPath | quote }}
