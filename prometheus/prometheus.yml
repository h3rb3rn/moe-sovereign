global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    system: moe-sovereign
scrape_configs:
- job_name: moe-orchestrator
  static_configs:
  - targets:
    - langgraph-orchestrator:8000
  metrics_path: /metrics
  scrape_interval: 15s
- job_name: prometheus
  static_configs:
  - targets:
    - localhost:9090
- job_name: node-exporter
  static_configs:
  - targets:
    - node-exporter:9100
  scrape_interval: 15s
- job_name: cadvisor
  static_configs:
  - targets:
    - cadvisor:8080
  scrape_interval: 15s
  metric_relabel_configs:
  - source_labels:
    - __name__
    regex: container_(tasks_state|memory_failures_total)
    action: drop
# Inference node scrape targets (private IPs — gitignored).
# Copy prometheus/node_targets.yml.example → prometheus/node_targets.yml and fill in your nodes.
- job_name: inference-nodes
  file_sd_configs:
  - files:
    - /etc/prometheus/node_targets.yml
    refresh_interval: 60s
  scrape_interval: 15s
  scrape_timeout: 10s
