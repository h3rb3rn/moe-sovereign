global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    system: moe-sovereign
scrape_configs:
- job_name: moe-orchestrator
  static_configs:
  - targets:
    - langgraph-orchestrator:8000
  metrics_path: /metrics
  scrape_interval: 15s
- job_name: prometheus
  static_configs:
  - targets:
    - localhost:9090
- job_name: node-exporter
  static_configs:
  - targets:
    - node-exporter:9100
  scrape_interval: 15s
- job_name: cadvisor
  static_configs:
  - targets:
    - cadvisor:8080
  scrape_interval: 15s
  metric_relabel_configs:
  - source_labels:
    - __name__
    regex: container_(tasks_state|memory_failures_total)
    action: drop
- job_name: inference-nodes
  static_configs:
  - targets:
    - node-0X.internal:9100
    labels:
      node: N04-RTX
  - targets:
    - node-0X.internal:9100
    labels:
      node: N07-GT
  - targets:
    - node-0X.internal:9100
    labels:
      node: N09-M60
  scrape_interval: 15s
  scrape_timeout: 10s
