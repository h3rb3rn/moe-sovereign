services:

  # --- Kafka (KRaft, kein Zookeeper) ---
  # License hygiene: Apache 2.0 (apache/kafka) instead of Confluent Community License (confluentinc/cp-kafka)
  moe-kafka:
    image: apache/kafka:3.7.1
    container_name: moe-kafka
    restart: always
    ports:
      - "127.0.0.1:${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      CLUSTER_ID: "moe-kafka-cluster-01"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@moe-kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://moe-kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 536870912
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      - ${MOE_DATA_ROOT}/kafka-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          cpus: '${KAFKA_CPU_LIMIT:-2}'
          memory: 2G
  # --- Neo4j Knowledge Graph (GraphRAG + Ontologie) ---
  neo4j-knowledge:
    image: neo4j:5-community
    container_name: neo4j-knowledge
    profiles: [neo4j]
    restart: always
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"   # Browser UI
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASS:-changeme}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1g
      - NEO4J_server_memory_pagecache_size=512m
      - NEO4J_db_tx__log_rotation_retention__policy=2 files
    volumes:
      - ${MOE_DATA_ROOT}/neo4j-data:/data
      - ${MOE_DATA_ROOT}/neo4j-logs:/logs
    deploy:
      resources:
        limits:
          cpus: '${NEO4J_CPU_LIMIT:-2}'
          memory: 8G

  # --- MCP Precision Tools Server ---
  mcp-precision:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    container_name: mcp-precision
    restart: always
    ports:
      - "127.0.0.1:${MCP_HOST_PORT:-8003}:8003"
    healthcheck:
      test: ["CMD", "python3", "-c", "from server import calculate; assert '4' in calculate('2+2')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    env_file:
      - .env
    volumes:
      - ${MOE_DATA_ROOT}/generated:/app/generated:rw,noexec,nosuid
    environment:
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j-knowledge:7687}
      - NEO4J_USER=neo4j
      - NEO4J_PASS=${NEO4J_PASS:-}

  # --- LangGraph Orchestrator (Dein Kern-System) ---
  langgraph-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph-orchestrator
    restart: always
    ports:
      - "${LANGGRAPH_HOST_PORT:-8002}:8000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '${LANGGRAPH_CPU_LIMIT:-2}'
          memory: 4G
        reservations:
          memory: 512M
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?missing — run scripts/install.sh (Linux) or scripts/bootstrap-macos.sh (macOS) first}@terra_cache:6379
      - POSTGRES_CHECKPOINT_URL=postgresql://langgraph:${POSTGRES_CHECKPOINT_PASSWORD:?missing — run scripts/install.sh (Linux) or scripts/bootstrap-macos.sh (macOS) first}@terra_checkpoints:5432/langgraph
      - MOE_USERDB_URL=postgresql://moe_admin:${MOE_USERDB_PASSWORD:?missing — run scripts/install.sh (Linux) or scripts/bootstrap-macos.sh (macOS) first}@terra_checkpoints:5432/moe_userdb
      - CHROMA_HOST=chromadb-vector
      - CHROMA_PORT=8000
      - MCP_URL=http://mcp-precision:8003
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j-knowledge:7687}
      - NEO4J_USER=neo4j
      - NEO4J_PASS=${NEO4J_PASS:-}
      - KAFKA_URL=kafka://moe-kafka:9092
      # LITELLM_URL aktiviert das Unified API Gateway (leer = direkter Ollama-Zugriff als Fallback)
      # - LITELLM_URL=http://litellm-proxy:4000
    volumes:
      - ${MOE_DATA_ROOT}/agent-logs:/app/logs
      - ${MOE_DATA_ROOT}/chroma-onnx-cache:/app/.cache/chroma
      - ./.env:/app/.env:ro
      - ${CLAUDE_SKILLS_DIR:-./skills}:/app/skills:ro
    depends_on:
      terra_cache:
        condition: service_started
      terra_checkpoints:
        condition: service_healthy
      chromadb-vector:
        condition: service_started
      mcp-precision:
        condition: service_started
      moe-kafka:
        condition: service_started

  # --- Postgres (LangGraph checkpoints via AsyncPostgresSaver) ---
  # Dedicated instance — keeps checkpoint data isolated from authentik-postgresql.
  terra_checkpoints:
    image: postgres:17-alpine
    container_name: terra_checkpoints
    restart: always
    environment:
      - POSTGRES_USER=langgraph
      - POSTGRES_PASSWORD=${POSTGRES_CHECKPOINT_PASSWORD:?missing — run scripts/install.sh (Linux) or scripts/bootstrap-macos.sh (macOS) first}
      - POSTGRES_DB=langgraph
      # Consumed by scripts/postgres-init/01-moe_admin.sh on first init only
      - MOE_USERDB_PASSWORD=${MOE_USERDB_PASSWORD:?missing — run scripts/install.sh (Linux) or scripts/bootstrap-macos.sh (macOS) first}
      # Consumed by scripts/postgres-init/02-libris.sh on first init only (moe-libris federation DB)
      - LIBRIS_DB_PASSWORD=${LIBRIS_DB_PASSWORD:-}
    volumes:
      - ${MOE_DATA_ROOT}/langgraph-checkpoints:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgraph -d langgraph && psql -U langgraph -d moe_userdb -c 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # --- Valkey (cache, moe:active:* keys, semaphores metadata) ---
  # BSD-3-Clause drop-in for Redis. LangGraph checkpoints live in Postgres (terra_checkpoints),
  # not here — valkey-search/RediSearch is not used (requires AVX2 which this host lacks).
  terra_cache:
    image: valkey/valkey:8-alpine
    container_name: terra_cache
    restart: always
    command: [
      "valkey-server",
      "--requirepass", "${REDIS_PASSWORD:?missing — run scripts/install.sh (Linux) or scripts/bootstrap-macos.sh (macOS) first}",
      "--appendonly", "yes",
      "--auto-aof-rewrite-percentage", "50",
      "--auto-aof-rewrite-min-size", "32mb",
      "--maxmemory", "400mb",
      "--maxmemory-policy", "allkeys-lru"
    ]
    volumes:
      - ${MOE_DATA_ROOT}/redis-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # --- ChromaDB (Vektorspeicher für RAG) ---
  chromadb-vector:
    image: chromadb/chroma:latest
    container_name: chromadb-vector
    restart: always
    ports:
      - "127.0.0.1:${CHROMA_HOST_PORT:-8001}:8000" # Host Port 8001 -> Container Port 8000
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - ${MOE_DATA_ROOT}/chroma-data:/data
    deploy:
      resources:
        limits:
          cpus: '${CHROMA_CPU_LIMIT:-2}'
          memory: 4G

  # --- Prometheus (Metriken-Scraper) ---
  moe-prometheus:
    image: prom/prometheus:latest
    container_name: moe-prometheus
    restart: always
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${MOE_DATA_ROOT}/prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS:-30}d'
      - '--web.enable-lifecycle'
    depends_on:
      - langgraph-app
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # --- Docker Socket Proxy (schützt Docker-Socket vor direktem Zugriff) ---
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: docker-socket-proxy
    restart: always
    environment:
      CONTAINERS: 1   # GET /containers/*
      STATS: 1        # GET /containers/*/stats
      LOGS: 1         # GET /containers/*/logs (required by Dozzle)
      EVENTS: 1       # GET /events (required by Dozzle real-time)
      VERSION: 1      # GET /version
      PING: 1         # GET /_ping
      POST: 1         # POST /containers/*/restart
      ALLOW_RESTARTS: 1  # required so moe-docs-sync can reload mkdocs serve after updating docs
      IMAGES: 1       # POST /images/prune (required by System Cleanup Manager)
      BUILD: 1        # POST /build/prune  (required by System Cleanup Manager)
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
    networks:
      - default

  # --- Admin UI (Web-Konfiguration für MoE Sovereign) ---
  moe-admin:
    build:
      context: ./admin_ui
      dockerfile: Dockerfile
    container_name: moe-admin
    restart: always
    ports:
      - "${ADMIN_UI_HOST_PORT:-8088}:8088"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE  # required: write to host-mounted .env (owned by host user, not container root)
    env_file:
      - .env
    environment:
      - PROMETHEUS_URL=http://moe-prometheus:9090
      - REDIS_URL=redis://:${REDIS_PASSWORD:?missing — run scripts/install.sh (Linux) or scripts/bootstrap-macos.sh (macOS) first}@terra_cache:6379
      - MOE_USERDB_URL=postgresql://moe_admin:${MOE_USERDB_PASSWORD:?missing — run scripts/install.sh (Linux) or scripts/bootstrap-macos.sh (macOS) first}@terra_checkpoints:5432/moe_userdb
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - POSTGRES_CHECKPOINT_URL=postgresql://langgraph:${POSTGRES_CHECKPOINT_PASSWORD:?}@terra_checkpoints:5432/langgraph
    volumes:
      - ./.env:/app/.env:rw
      - ./.moe-services.json:/app/.moe-services.json:ro
      - ${CLAUDE_SKILLS_DIR:-./skills}:/app/skills:rw
      - ./skills-upstream:/app/skills-upstream:rw
      - ${MOE_DATA_ROOT}/admin-logs:/app/logs:rw
      - ./grafana/dashboards:/app/grafana/dashboards:rw
      - ./prometheus/prometheus.yml:/app/prometheus/prometheus.yml:rw
      - ${MOE_DATA_ROOT}/gap-healer-stats:/app/gap-healer-stats:ro
      - ./benchmarks:/app/benchmarks:rw
      - ${MOE_DATA_ROOT}/cleanup-config.json:/app/cleanup-config.json:rw
      - ${MOE_DATA_ROOT}/cleanup-history.jsonl:/app/cleanup-history.jsonl:rw
      - ${MOE_DATA_ROOT}/checkpoint-archives:/app/checkpoint-archives:rw
    depends_on:
      langgraph-app:
        condition: service_started
      moe-prometheus:
        condition: service_started
      terra_cache:
        condition: service_started
      terra_checkpoints:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    networks:
      - default
      - authentik_network   # server-side token exchange with authentik-server
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # --- Grafana (Visualisierung & Dashboards) ---
  moe-grafana:
    image: grafana/grafana:latest
    container_name: moe-grafana
    restart: always
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"
    user: "472"
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?missing — run scripts/install.sh (Linux) or scripts/bootstrap-macos.sh (macOS) first}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/moe-operations.json
    volumes:
      - ${GRAFANA_DATA_ROOT:-/opt/grafana}/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ${GRAFANA_DATA_ROOT:-/opt/grafana}/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - moe-prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # --- node-exporter (Host-Metriken: CPU, RAM, Disk, Network) ---
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    ports:
      - "127.0.0.1:${NODE_EXPORTER_HOST_PORT:-9100}:9100"
    pid: host
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.netclass.ignored-devices=^(veth|br|docker|lo).*'
    # Podman rootless: prom/node-exporter uses a read-only rootfs; Podman needs
    # a writable /run to inject .containerenv.  A tmpfs satisfies this without
    # granting broader write access to the host filesystem.
    tmpfs:
      - /run
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  # --- cAdvisor (Container-Ressourcen-Metriken) ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CADVISOR_HOST_PORT:-9338}:8080"
    cap_add:
      - SYS_ADMIN
    # Podman rootless: same tmpfs /run fix as node-exporter (read-only rootfs).
    # /var/run is omitted: on Linux it is a symlink to /run, so mounting it
    # read-only would silently replace the tmpfs and re-introduce the problem.
    # CONTAINER_STORAGE_ROOT must point to the runtime's storage root:
    #   Docker  → /var/lib/docker  (default)
    #   Podman  → ~/.local/share/containers/storage  (rootless default)
    tmpfs:
      - /run
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - ${CONTAINER_STORAGE_ROOT:-/var/lib/docker}:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  # --- MkDocs Dokumentations-Server ---
  moe-docs:
    image: squidfunk/mkdocs-material:latest
    container_name: moe-docs
    restart: unless-stopped
    ports:
      - "${DOCS_HOST_PORT:-8098}:8000"   # Direktzugriff intern: http://localhost:8098
    volumes:
      - .:/docs:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # --- MkDocs Sync-Agent (aktualisiert Status, Experts, Self-Correction alle 15 min) ---
  moe-docs-sync:
    build:
      context: .
      dockerfile: docker/Dockerfile.sync
    container_name: moe-docs-sync
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    volumes:
      - .:/app
      # podman-compose does not support nested variable substitution; FEW_SHOT_HOST_DIR
      # is always written to .env by install.sh so the fallback is not needed.
      - ${FEW_SHOT_HOST_DIR}:/moe-few-shot:ro
    environment:
      - DOCS_DIR=/app/docs
      - EXPERTS_PATH=/app/prompts/systemprompt
      - PROMETHEUS_URL=http://moe-prometheus:9090
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    command: >
      sh -c "while true; do python /app/sync_agent.py; sleep 900; done"
    depends_on:
      - moe-prometheus
      - docker-socket-proxy

  # --- Dozzle Init (generates bcrypt users.yml from .env credentials) ---
  moe-dozzle-init:
    image: python:3.12-alpine
    restart: "no"
    env_file:
      - .env
    environment:
      DOZZLE_USERS_FILE: /data/dozzle-users.yml
    volumes:
      - ${MOE_DATA_ROOT}:/data
      - ./scripts/dozzle-init.sh:/dozzle-init.sh:ro
    command: ["sh", "/dozzle-init.sh"]

  # --- Dozzle (Container Log Viewer) ---
  moe-dozzle:
    image: amir20/dozzle:latest
    container_name: moe-dozzle
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DOZZLE_AUTH_PROVIDER: simple
    ports:
      - "127.0.0.1:${DOZZLE_HOST_PORT:-9999}:8080"   # local access: http://localhost:9999
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ${MOE_DATA_ROOT}/dozzle-users.yml:/data/users.yml:ro
    depends_on:
      moe-dozzle-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 128M

  # --- Splash — JavaScript-capable headless browser for MCP web_browser tool ---
  # Renders JS-heavy pages (BBC scripts, British Museum collection, GitHub issues)
  # that SearXNG's static indexer cannot handle. Lightweight (<200MB), REST API.
  moe-splash:
    image: scrapinghub/splash:latest
    container_name: moe-splash
    restart: unless-stopped
    command: --maxrss 512 --slots 4
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # --- JupyterLab (server-side Python kernel for the Admin Notebook) ---
  # BSD-3-Clause. Proxied by moe-admin at /notebook/ so no port needs exposing.
  # Token auth disabled — moe-admin session layer is the authentication boundary.
  moe-jupyterlab:
    image: quay.io/jupyter/scipy-notebook:latest
    container_name: moe-jupyterlab
    restart: unless-stopped
    user: root
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      CHOWN_HOME: "yes"
      GRANT_SUDO: "yes"
    # Exposed directly on host so the browser's WebSocket can reach it
    # without traversing the Nginx Basic-Auth layer (browsers cannot send
    # Authorization headers in the WebSocket() constructor).
    ports:
      - "${JUPYTERLAB_HOST_PORT:-8899}:8888"
    command: >
      start-notebook.sh
      --ServerApp.base_url=/notebook/
      --ServerApp.token=${JUPYTERLAB_TOKEN}
      --ServerApp.allow_origin=*
      --ServerApp.disable_check_xsrf=true
    volumes:
      - ${MOE_DATA_ROOT}/jupyterlab:/home/jovyan/work
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # --- Garage (S3-compatible object store, AGPLv3) ---
  # Replaces MinIO after its 2026-04-25 archival.
  # Developed by Deuxfleurs (French non-profit) — aligns with our EU
  # sovereignty posture. Drop-in S3 API on port 3900; admin API on 3903.
  moe-storage-garage:
    image: dxflrs/garage:v1.0.1
    container_name: moe-storage-garage
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${MOE_DATA_ROOT}/garage/meta:/var/lib/garage/meta
      - ${MOE_DATA_ROOT}/garage/data:/var/lib/garage/data
      - ${MOE_DATA_ROOT}/garage/etc/garage.toml:/etc/garage.toml:ro
    ports:
      - "3900:3900"   # S3 API
      - "3903:3903"   # admin API
    healthcheck:
      # Garage image is distroless (no shell/wget). Binary lives at /garage (not in PATH).
      # `garage status` exits 0 when the node is operational.
      test: ["CMD", "/garage", "status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # --- Caddy Reverse Proxy (TLS für docs.moe-sovereign.org) ---
  # Only started when COMPOSE_PROFILES includes "caddy" (set by install.sh).
  moe-caddy:
    image: caddy:2-alpine
    container_name: moe-caddy
    profiles: [caddy]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./install.sh:/srv/install.sh:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - moe-docs
      - moe-dozzle

  # --- Authentik SSO Stack ---
  # All four services are started when COMPOSE_PROFILES includes "authentik".
  # Set by install.sh; to add manually: echo 'COMPOSE_PROFILES=authentik' >> .env
  # then re-run: sudo <compose> --profile authentik up -d

  authentik-postgresql:
    image: postgres:16-alpine
    container_name: authentik-postgresql
    profiles: [authentik]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AUTHENTIK_POSTGRESQL__USER:-authentik}
      POSTGRES_DB: ${AUTHENTIK_POSTGRESQL__NAME:-authentik}
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRESQL__PASSWORD:-}
    volumes:
      - ${MOE_DATA_ROOT}/authentik/postgres:/var/lib/postgresql/data
    networks:
      - authentik_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTHENTIK_POSTGRESQL__USER:-authentik}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # License hygiene: Valkey (BSD-3-Clause) instead of Redis (SSPL/RSALv2 ≥ 7.4)
  authentik-redis:
    image: valkey/valkey:8-alpine
    container_name: authentik-redis
    profiles: [authentik]
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    volumes:
      - ${MOE_DATA_ROOT}/authentik/redis:/data
    networks:
      - authentik_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.2.1}
    container_name: authentik-server
    profiles: [authentik]
    restart: unless-stopped
    command: server
    env_file:
      - .env   # provides AUTHENTIK_BOOTSTRAP_EMAIL/PASSWORD directly
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRESQL__USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRESQL__NAME:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRESQL__PASSWORD:-}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - ${MOE_DATA_ROOT}/authentik/media:/media
      - ${MOE_DATA_ROOT}/authentik/custom-templates:/templates
      - ${MOE_DATA_ROOT}/authentik/blueprints:/blueprints/custom:ro
    ports:
      - "${AUTHENTIK_HTTP_PORT:-9000}:9000"
      - "${AUTHENTIK_HTTPS_PORT:-9443}:9443"
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    networks:
      - authentik_network
      - default

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.2.1}
    container_name: authentik-worker
    profiles: [authentik]
    restart: unless-stopped
    command: worker
    user: root
    env_file:
      - .env   # provides AUTHENTIK_BOOTSTRAP_EMAIL/PASSWORD directly
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRESQL__USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRESQL__NAME:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRESQL__PASSWORD:-}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - ${MOE_DATA_ROOT}/authentik/certs:/certs
      - ${MOE_DATA_ROOT}/authentik/media:/media
      - ${MOE_DATA_ROOT}/authentik/custom-templates:/templates
      - ${MOE_DATA_ROOT}/authentik/blueprints:/blueprints/custom:ro
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    networks:
      - authentik_network

volumes:
  caddy_data:
  caddy_config:


networks:
  default:
    # Explicit declaration required by podman-compose; Docker Compose would
    # create this implicitly, but older podman-compose versions do not.
    driver: bridge
  authentik_network:
    # Shared network for Authentik server/worker/db/redis and the MoE app.
    # Created automatically when the "authentik" profile is active.
    driver: bridge
