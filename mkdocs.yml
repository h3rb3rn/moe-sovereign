site_name: Sovereign MoE – Documentation
site_description: Sovereign Mixture-of-Experts Orchestrator – Complete Documentation
site_author: Philipp Horn
docs_dir: docs

theme:
  name: material
  font: false
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  # Local mermaid.min.js is kept purely so mkdocs-material's built-in
  # loader (which checks `typeof mermaid == "undefined"`) can reuse it and
  # skip its own unpkg.com fetch — useful for offline / air-gapped builds.
  # Do NOT add a mermaid-init.js: material handles init + render + theme
  # switching on its own. See docs/assets/js/README.md.
  - assets/js/mermaid.min.js

