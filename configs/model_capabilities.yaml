# configs/model_capabilities.yaml — Per-model capability matrix (TASK-31).
#
# Missing models fall back to "default" — no KeyError.
# Hot-reload: set CAPABILITIES_RELOAD_ON_REQUEST=true (dev only, avoids rebuild).
#
# Fields:
#   json_schema  — honours response_format={"type":"json_schema",...}
#   json_object  — honours response_format={"type":"json_object"}
#   stream       — supports streaming (stream=true)
#   responses_api — uses /v1/responses instead of /v1/chat/completions
#   hints        — capability tokens for router/prompt selection

default:
  json_schema: false
  json_object: true
  stream: true
  responses_api: false
  hints: []

